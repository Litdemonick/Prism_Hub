name: prism_hub
description: "PrismHub — app multiplataforma de entretenimiento impulsada por Prism+"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- Estado / DI / Navegación ---
  get: ^4.7.3              # State management + dependency injection
  go_router: ^17.3.0       # Declarative routing (shell + nested)

  # --- Red / Scraping ---
  dio: ^5.9.2              # HTTP client
  cookie_jar: ^4.0.9
  dio_cookie_manager: ^3.4.0
  html: ^0.15.6            # HTML parsing
  xpath_selector_html_parser: ^3.0.1

  # --- Motor de extensiones ---
  flutter_js: ^0.8.7       # Runtime JavaScript para extensiones (.js)

  # --- Reproductor (anime) ---
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7

  # --- Persistencia ---
  isar: 3.1.0+1            # Base de datos estructurada (biblioteca, historial)
  isar_flutter_libs: 3.1.0+1
  hive: ^2.2.3             # Almacenamiento KV ligero
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.5
  path: ^1.9.1
  path_provider: ^2.1.5

  # --- UI / Plataforma ---
  cached_network_image: ^3.4.1
  window_manager: ^0.5.1   # Control de ventana en desktop
  flutter_i18n: ^0.37.1    # Internacionalización (es/en)

  # --- Utilidades ---
  package_info_plus: ^10.1.0
  logging: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  isar_generator: 3.1.0+1

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/
    - assets/icons/
    - assets/logo_prismhub.png
