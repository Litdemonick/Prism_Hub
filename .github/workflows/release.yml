name: Release CI

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  build-and-release-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.16.8
          channel: stable
      - name: Setup Android SDK 34
        run: |
          sdkmanager="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          echo "y" | $sdkmanager --uninstall "platforms;android-36" || true
          echo "y" | $sdkmanager "platforms;android-34" "build-tools;34.0.0"
      - name: Decode keystore
        run: echo $ENCODED_KEYSTORE | base64 -di > android/app/keystore.jks
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE }}
      - run: flutter pub get
      - name: Build APKs
        run: flutter build apk --release --split-per-abi
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      - name: Release Android
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "build/app/outputs/flutter-apk/app-*.apk"
          allowUpdates: true
          omitBody: true

  build-and-release-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.16.8
          channel: stable
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libmpv-dev mpv
      - run: flutter pub get
      - name: Build Linux
        run: flutter build linux --release
      - name: Package
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../PrismHub-${{ github.ref_name }}-linux-x64.tar.gz .
      - name: Release Linux
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "PrismHub-${{ github.ref_name }}-linux-x64.tar.gz"
          allowUpdates: true
          omitBody: true

  build-and-release-windows:
    runs-on: windows-2019
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.16.8
          channel: stable
      - run: flutter pub get
      - name: Build Windows
        run: flutter build windows --release
      - name: Build Installer
        run: >
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe"
          /DMyAppVersion="${{ github.ref_name }}"
          inno_setup.iss
      - name: Package zip
        run: |
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "PrismHub-${{ github.ref_name }}-windows-x64.zip"
      - name: Release Windows
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "Output/*.exe,PrismHub-${{ github.ref_name }}-windows-x64.zip"
          allowUpdates: true
          omitBody: true
