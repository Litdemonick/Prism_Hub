name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  # ---------------------------------------------------------------------------
  # TypeScript — extensiones
  # ---------------------------------------------------------------------------
  typescript:
    name: TypeScript (extensiones)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install Node deps
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

  # ---------------------------------------------------------------------------
  # Flutter — app
  # ---------------------------------------------------------------------------
  flutter-analyze:
    name: Flutter Analyze & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: stable
          cache: true

      - name: Install Flutter deps
        run: flutter pub get

      - name: Generate Isar code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Dart format check
        # Excluye archivos generados por build_runner (*.g.dart) del check
        run: |
          find lib -name "*.dart" ! -name "*.g.dart" ! -name "*.freezed.dart" \
            | xargs dart format --output=none --set-exit-if-changed

      - name: Flutter analyze
        run: flutter analyze --fatal-infos

  flutter-test:
    name: Flutter Unit Tests
    runs-on: ubuntu-latest
    needs: flutter-analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter test
